<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes, viewport-fit=cover">
  <title>VioletDracarys · Smart Copy Tracker</title>
  <script>
    const APP_VERSION = 4;
    fetch("version.json?rand=" + Date.now())
      .then(res => res.json())
      .catch(() => {})
      .then(data => {
        if (data && APP_VERSION < data.latestVersion) {
          document.body.innerHTML = `
            <div style="font-family: system-ui, sans-serif; text-align: center; margin-top: 20vh; padding: 16px;">
              <h2>✨ New Update Available</h2>
              <p>Please download the latest Horamavu Survey App</p>
              <a href="${data.updateUrl}" style="background: #7c3aed; color: white; padding: 12px 24px; border-radius: 999px; text-decoration: none; display: inline-block; margin-top: 12px; box-shadow: 0 4px 12px rgba(124,58,237,0.3);">Download Update</a>
            </div>`;
        }
      });
  </script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(145deg, #faf5ff 0%, #f3e8ff 100%);
      color: #2e1065;
      padding: 16px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .container {
      max-width: 100%;
      width: 100%;
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(0px);
      border-radius: 2rem;
      box-shadow: 0 25px 45px -12px rgba(91, 33, 182, 0.25), 0 0 0 1px rgba(139, 92, 246, 0.1);
      padding: 24px 20px;
      transition: all 0.2s ease;
    }

    h1 {
      font-size: 1.85rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #6d28d9, #a855f7);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    h1 span {
      background: #ede9fe;
      color: #6b21a5;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 40px;
      letter-spacing: normal;
    }

    .subhead {
      color: #6b21a5;
      margin-bottom: 24px;
      font-size: 0.9rem;
      border-bottom: 1px solid #e9d5ff;
      padding-bottom: 14px;
      font-weight: 500;
    }

    .file-section {
      background: #faf5ff;
      border-radius: 1.5rem;
      padding: 20px 16px;
      margin-bottom: 24px;
      border: 1px solid #e9d5ff;
      transition: box-shadow 0.2s;
    }

    .file-input-container {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .file-label {
      background: white;
      border: 1.5px solid #d8b4fe;
      color: #4c1d95;
      padding: 14px 18px;
      border-radius: 60px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      box-shadow: 0 1px 2px rgba(0,0,0,0.02);
    }

    .file-label:active {
      background: #f3e8ff;
      transform: scale(0.97);
      border-color: #a855f7;
    }

    .file-name {
      color: #4b2a7a;
      font-size: 0.85rem;
      background: white;
      padding: 12px 16px;
      border-radius: 40px;
      border: 1px solid #e9d5ff;
      word-break: break-all;
      font-weight: 500;
    }

    input[type="file"] { display: none; }

    .button-group {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin: 16px 0 8px;
    }

    .btn {
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 12px 18px;
      border-radius: 60px;
      border: none;
      background: white;
      color: #3b0764;
      border: 1px solid #d8b4fe;
      cursor: pointer;
      transition: all 0.2s ease;
      flex: 1 1 auto;
      min-width: 112px;
      text-align: center;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.02);
    }

    .btn-primary {
      background: #7c3aed;
      border-color: #7c3aed;
      color: white;
      box-shadow: 0 4px 10px rgba(124, 58, 237, 0.2);
    }

    .btn-primary:active { background: #6d28d9; transform: scale(0.96); box-shadow: 0 2px 5px rgba(124,58,237,0.3);}
    .btn:active { background: #f3e8ff; transform: scale(0.96); }

    .btn:disabled {
      opacity: 0.5;
      pointer-events: none;
      filter: grayscale(0.05);
    }

    .status {
      background: #f3e8ff;
      border-left: 5px solid #8b5cf6;
      color: #2e1065;
      padding: 14px 18px;
      border-radius: 1.25rem;
      margin: 16px 0;
      font-size: 0.85rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 10px;
      animation: fadeSlide 0.25s ease;
    }

    .status.error { background: #fee2e2; border-left-color: #e11d48; color: #881337; }
    .status.warning { background: #ffedd5; border-left-color: #f97316; color: #7c2d12; }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(-6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .filter-container {
      display: flex;
      gap: 10px;
      flex-wrap: nowrap;
      overflow-x: auto;
      padding: 8px 0 18px;
      margin: 0 -6px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: thin;
    }

    .filter-btn, .search-btn, .clear-search {
      background: white;
      border: 1px solid #d8b4fe;
      padding: 10px 20px;
      border-radius: 80px;
      font-size: 0.85rem;
      font-weight: 600;
      color: #4c1d95;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .filter-btn.active {
      background: #8b5cf6;
      border-color: #8b5cf6;
      color: white;
      box-shadow: 0 6px 12px -6px #c084fc;
    }

    .filter-btn:active, .search-btn:active, .clear-search:active {
      background: #e9d5ff;
      transform: scale(0.94);
    }

    .search-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin: 12px 0 16px;
    }

    .search-box {
      padding: 14px 20px;
      border-radius: 60px;
      border: 1.5px solid #e9d5ff;
      font-size: 0.95rem;
      width: 100%;
      background: white;
      transition: all 0.2s;
      font-weight: 500;
    }

    .search-box:focus {
      outline: none;
      border-color: #a855f7;
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
    }

    .search-row {
      display: flex;
      gap: 10px;
    }
    .search-row .search-btn, .search-row .clear-search { flex: 1; padding: 12px 0; }

    .table-container {
      border-radius: 1.5rem;
      border: 1px solid #e9d5ff;
      background: white;
      overflow-x: auto;
      margin-top: 20px;
      -webkit-overflow-scrolling: touch;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.02);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
      min-width: 520px;
    }

    th {
      background: #faf5ff;
      color: #4c1d95;
      font-weight: 700;
      font-size: 0.8rem;
      padding: 16px 12px;
      text-align: left;
      border-bottom: 1.5px solid #e9d5ff;
      white-space: nowrap;
    }

    td {
      padding: 14px 12px;
      border-bottom: 1px solid #f3e8ff;
      color: #2d1b4e;
    }

    /* hide survey model + link columns for clean look (optional) but keep accessible */
    th:nth-child(3), td:nth-child(3),
    th:nth-child(4), td:nth-child(4) { display: none; }

    .copy-btn {
      background: white;
      border: 1.5px solid #c084fc;
      color: #6d28d9;
      padding: 8px 16px;
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.15s ease;
      width: 100%;
      max-width: 110px;
    }
    .copy-btn:active { background: #f3e8ff; transform: scale(0.94); }
    .copy-btn.copied {
      background: #10b981;
      border-color: #10b981;
      color: white;
      box-shadow: 0 2px 8px rgba(16,185,129,0.3);
    }
    .copy-btn.already-copied {
      background: #cbd5e1;
      border-color: #94a3b8;
      color: #1e293b;
      cursor: not-allowed;
      opacity: 0.7;
    }

    .copy-flash {
      position: fixed;
      background: radial-gradient(circle, #a78bfa, #c084fc);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      animation: violetFlash 0.45s ease-out forwards;
    }

    @keyframes violetFlash {
      0% { opacity: 0.7; transform: scale(0.3); background: #a855f7; }
      100% { opacity: 0; transform: scale(2.2); background: #d8b4fe; }
    }

    .qr-modal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(46, 16, 101, 0.5);
      backdrop-filter: blur(8px);
      align-items: center;
      justify-content: center;
      z-index: 2000;
      padding: 16px;
    }

    .qr-modal-content {
      background: #ffffffdd;
      background: white;
      border-radius: 2rem;
      padding: 24px 20px;
      max-width: 500px;
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
      box-shadow: 0 30px 50px -20px #2e1065;
      border: 1px solid #e9d5ff;
    }

    .qr-modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
    }

    .close-modal {
      background: #f3e8ff;
      border: none;
      font-size: 24px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      cursor: pointer;
      transition: 0.15s;
      color: #6b21a5;
    }
    .close-modal:active { background: #e9d5ff; transform: scale(0.92);}

    .qr-display {
      background: #fbfaff;
      border-radius: 1.5rem;
      padding: 20px;
      margin: 12px 0;
      border: 1px solid #e9d5ff;
      overflow: hidden;
    }

    .qr-slides {
      display: flex;
      transition: transform 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    .qr-slide {
      min-width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .qr-code {
      background: white;
      padding: 10px;
      border-radius: 24px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.03);
    }

    .qr-code img { max-width: 160px; height: auto; }

    .qr-nav {
      display: flex;
      justify-content: center;
      gap: 18px;
      margin: 20px 0 8px;
    }
    .qr-nav-btn {
      background: white;
      border: 1px solid #c084fc;
      padding: 10px 24px;
      border-radius: 60px;
      font-weight: 600;
      color: #6d28d9;
      cursor: pointer;
    }

    .copy-stats {
      font-size: 0.75rem;
      background: #ede9fe;
      padding: 6px 14px;
      border-radius: 30px;
      display: inline-block;
      margin-bottom: 10px;
      font-weight: 600;
      color: #4c1d95;
    }

    .bottom-note {
      text-align: center;
      font-size: 0.7rem;
      color: #8b5cf6;
      margin-top: 20px;
      font-weight: 500;
    }

    button, .btn, .filter-btn, .copy-btn {
      cursor: pointer;
      user-select: none;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>🟣 Dracarys <span></span></h1>
  <div class="subhead"></div>

  <div class="file-section">
    <div class="file-input-container">
      <label for="fileInput" class="file-label">📂 Choose Excel file (XLSX / XLS)</label>
      <input type="file" id="fileInput" accept=".xlsx, .xls">
      <div class="file-name" id="fileName">📄 No file selected</div>
    </div>
    <div class="button-group">
      <button class="btn btn-primary" id="generateBtn" disabled>✨ Generate Links</button>
      <button class="btn" id="clearAllBtn">🗑️ Clear All</button>
    </div>
  </div>

  <div id="processing" style="display: none; margin: 8px 0; color:#a855f7; font-weight:600; text-align:center;">⏳ Processing ...</div>
  <div id="status" class="status" style="display: none;"></div>

  <div class="button-group" style="margin-bottom: 6px;">
    <button class="btn" id="copyAllBtn" disabled>📋 Copy all fresh</button>
    <button class="btn" id="exportBtn" disabled>⬇️ Export CSV</button>
    <button class="btn" id="openQRBtn" disabled>📲 QR Gallery</button>
  </div>

  <div id="copyStatsDisplay" class="copy-stats" style="display: none;"></div>

  <div class="filter-container" id="salesTypeFilters" style="display: none;">
    <button class="filter-btn active" data-type="all">✨ All</button>
    <button class="filter-btn" data-type="DINE-IN">🍽️ Dine-in</button>
    <button class="filter-btn" data-type="TAKEAWAY">🥡 Takeaway</button>
    <button class="filter-btn" data-type="DELIVERY">🚚 Delivery</button>
  </div>

  <div class="search-container">
    <input type="text" id="searchBox" class="search-box" placeholder="Search Receipt / Order ID (e.g., 5031)" disabled>
    <div class="search-row">
      <button class="search-btn" id="searchBtn" disabled>🔍 Search</button>
      <button class="clear-search" id="clearSearchBtn" disabled>🧹 Clear</button>
    </div>
  </div>

  <div class="table-container">
    <table id="linkTable">
      <thead><tr><th>Receipt No.</th><th>Sales Type</th><th>Survey Model</th><th>Generated Link</th><th>Action</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
  <div class="bottom-note">🔒 Once a link is copied, it becomes locked for this exact file (persistent across sessions). Re-upload marks as "Already copied".</div>
</div>

<div class="qr-modal" id="qrModal">
  <div class="qr-modal-content">
    <div class="qr-modal-header"><h2 style="color:#5b21b6;">📱 Violet QR Codes</h2><button class="close-modal" onclick="closeQRModal()">✕</button></div>
    <div class="filter-container" id="qrFilters" style="padding-top: 0;">
      <button class="filter-btn active" data-type="all">All</button>
      <button class="filter-btn" data-type="DINE-IN">Dine-in</button>
      <button class="filter-btn" data-type="TAKEAWAY">Takeaway</button>
      <button class="filter-btn" data-type="DELIVERY">Delivery</button>
    </div>
    <div class="qr-display" id="qrDisplay"><div class="qr-slides" id="qrSlides"></div></div>
    <div class="qr-nav"><button class="qr-nav-btn" id="prevBtn">← Prev</button><button class="qr-nav-btn" id="nextBtn">Next →</button></div>
    <div class="qr-counter" id="qrCounter" style="text-align:center; margin-top:10px; font-weight:600;">1 / 0</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>

<script>
  // ----- Violet Edition: smooth copy tracker with persistent lock per file id -----
  let currentFileID = null;
  let copiedLinksArchive = new Set();
  let globalCopiedTracker = new Map();
  let currentData = [];
  let filteredData = [];
  let currentQRData = [];
  let currentQRIndex = 0;
  const storeID = "91KDIPL879-01";

  function loadTracker() { const stored = localStorage.getItem('violet_survey_tracker'); if(stored) { try{ const obj=JSON.parse(stored); for(let[fid,arr] of Object.entries(obj)) globalCopiedTracker.set(fid, new Set(arr)); }catch(e){} } }
  function saveTracker() { const obj={}; for(let[fid,set] of globalCopiedTracker.entries()) obj[fid]=Array.from(set); localStorage.setItem('violet_survey_tracker', JSON.stringify(obj)); }
  loadTracker();

  function getFileID(file) { return `${file.name}_${file.size}_${file.lastModified}`; }

  function showStatus(msg, type='success') {
    const el = document.getElementById('status');
    el.textContent = msg; el.className = `status ${type}`; el.style.display = 'flex';
    setTimeout(() => { if(el.style.display === 'flex') el.style.display = 'none'; }, 2800);
  }

  function triggerCopyFlash(x,y) { const flash=document.createElement('div'); flash.className='copy-flash'; flash.style.left=(x-28)+'px'; flash.style.top=(y-28)+'px'; flash.style.width='56px'; flash.style.height='56px'; document.body.appendChild(flash); setTimeout(()=>flash.remove(),420); }

  function convertExcelDate(serial) { const date = new Date((serial - 25569) * 86400 * 1000); return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`; }
  function convertExcelTime(serial) { const total = Math.round(serial * 24 * 60 * 60 * 1000); return `${String(Math.floor(total / 3600000)).padStart(2,'0')}:${String(Math.floor((total % 3600000) / 60000)).padStart(2,'0')}:${String(Math.floor((total % 60000) / 1000)).padStart(2,'0')}`; }

  function generateSurveyLink(row) {
    const receiptNo = row['Receipt No.'];
    const salesType = row['Sales Type'];
    let surveyModel = '', orderID = '', numericOT = '';
    if (/^\d+$/.test(receiptNo) && salesType === 'TAKEAWAY') { surveyModel = '6.0'; orderID = receiptNo; numericOT = '2'; }
    else if (/^\d+$/.test(receiptNo) && salesType === 'DINE-IN') { surveyModel = '6.0'; orderID = receiptNo; numericOT = '1'; }
    else if (receiptNo.startsWith('K281') && salesType === 'TAKEAWAY') { surveyModel = '4.0'; orderID = receiptNo.slice(-4); numericOT = '2'; }
    else if (receiptNo.startsWith('K281') && salesType === 'DINE-IN') { surveyModel = '4.0'; orderID = receiptNo.slice(-4); numericOT = '1'; }
    else if (receiptNo.startsWith('K281') && salesType === 'DELIVERY') { surveyModel = '3.0'; orderID = receiptNo; numericOT = '3'; }
    else return null;
    const date = convertExcelDate(row['Date']);
    const time = convertExcelTime(row['Time']);
    const phone = `91${row['Sell-to Contact No.']}`;
    const iso = `${date}T${time}Z`;
    const data = { S: storeID, OI: orderID, D: date, TM: time, DTM: iso, TI: orderID, OT: numericOT, SM: surveyModel, PH: phone };
    return `https://customer.kfc-listens.com/jfe/form/SV_8bHC0noyvM3jPWC?Q_EED=${btoa(JSON.stringify(data))}`;
  }

  function markLinkAsCopied(link) {
    if(!currentFileID) return false;
    if(copiedLinksArchive.has(link)) return false;
    copiedLinksArchive.add(link);
    globalCopiedTracker.set(currentFileID, copiedLinksArchive);
    saveTracker();
    const item = currentData.find(d=>d.link===link);
    if(item) item.copied=true;
    return true;
  }

  function displayData(data) {
    const tbody = document.querySelector('#linkTable tbody');
    tbody.innerHTML = '';
    data.forEach(item => {
      const tr = document.createElement('tr');
      const isLocked = item.copied === true;
      const btnText = isLocked ? '🔒 Locked' : '📋 Copy';
      const btnClass = isLocked ? 'copy-btn already-copied' : 'copy-btn';
      tr.innerHTML = `<td>${item.receiptNo}</td><td>${item.salesType}</td><td>${item.surveyModel}</td><td style="display:none;">${item.link}</td><td><button class="${btnClass}" data-link="${item.link}" data-receipt="${item.receiptNo}" ${isLocked ? 'disabled' : ''}>${btnText}</button></td>`;
      tbody.appendChild(tr);
    });
    document.querySelectorAll('.copy-btn:not(.already-copied)').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const link = btn.dataset.link;
        const receipt = btn.dataset.receipt;
        if(!link) return;
        if(copiedLinksArchive.has(link)) { showStatus(`🔐 Receipt ${receipt} already locked!`, 'error'); btn.textContent='Locked'; btn.disabled=true; btn.classList.add('already-copied'); const t=currentData.find(d=>d.link===link); if(t) t.copied=true; displayData(filteredData.length?filteredData:currentData); return; }
        const ta = document.createElement('textarea'); ta.value=link; ta.style.position='fixed'; ta.style.left='-9999px'; document.body.appendChild(ta); ta.select();
        let copied=false;
        try{ copied=document.execCommand('copy'); } catch(e){ copied=false; }
        document.body.removeChild(ta);
        if(copied){
          markLinkAsCopied(link);
          btn.textContent='✨ Copied!'; btn.classList.add('copied'); btn.disabled=true;
          const rect=btn.getBoundingClientRect(); triggerCopyFlash(rect.left+rect.width/2, rect.top+rect.height/2);
          showStatus(`✅ ${receipt} copied & permanently locked`, 'success');
          const statsDiv=document.getElementById('copyStatsDisplay');
          const newCopiedCount=currentData.filter(d=>d.copied).length;
          statsDiv.innerHTML=`🔒 Locked: ${newCopiedCount} / ${currentData.length} (persistent)`;
          if(filteredData.length){ filteredData=filteredData.map(d=>d.link===link?{...d,copied:true}:d); displayData(filteredData);}
          else displayData(currentData);
        } else showStatus('❌ Copy failed', 'error');
      });
    });
  }

  function processFile() {
    const file = document.getElementById('fileInput').files[0];
    if(!file) return showStatus('Select an Excel file', 'error');
    const fileID = getFileID(file);
    currentFileID = fileID;
    copiedLinksArchive = globalCopiedTracker.get(fileID) || new Set();
    document.getElementById('processing').style.display = 'block';
    const reader = new FileReader();
    reader.onload = function(e){
      try{
        const wb = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
        const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
        const filteredRaw = rows.filter(r => !(r['POS Receipt No.']||'').match(/K281SWG|K281ZMT|K281MAGIC/));
        const newData=[];
        filteredRaw.forEach(r => {
          const link = generateSurveyLink(r);
          if(link) newData.push({ receiptNo: r['Receipt No.'], salesType: r['Sales Type'], surveyModel: link.includes('SM=6.0')?'6.0':link.includes('SM=4.0')?'4.0':'3.0', link: link, copied: copiedLinksArchive.has(link) });
        });
        currentData = newData; filteredData=[];
        displayData(currentData);
        document.getElementById('processing').style.display='none';
        const lockedCount=currentData.filter(d=>d.copied).length;
        showStatus(`✨ Loaded ${currentData.length} records. Locked links: ${lockedCount}`, lockedCount>0?'warning':'success');
        document.getElementById('copyAllBtn').disabled=false; document.getElementById('exportBtn').disabled=false; document.getElementById('openQRBtn').disabled=false;
        document.getElementById('searchBox').disabled=false; document.getElementById('searchBtn').disabled=false; document.getElementById('clearSearchBtn').disabled=false;
        document.getElementById('salesTypeFilters').style.display='flex';
        const statsDiv=document.getElementById('copyStatsDisplay'); statsDiv.style.display='block';
        statsDiv.innerHTML=`🔒 Locked: ${lockedCount} / ${currentData.length} (re-upload prevents re-copy)`;
        generateQRCodes(currentData);
      } catch(err){ document.getElementById('processing').style.display='none'; showStatus('Error: '+err.message,'error');}
    };
    reader.readAsArrayBuffer(file);
  }

  function copyAllLinks(){
    const dataSource = filteredData.length?filteredData:currentData;
    const fresh = dataSource.filter(d=>!d.copied);
    if(fresh.length===0) return showStatus('No fresh links — all locked!','warning');
    const allLinks = fresh.map(d=>d.link).join('\n');
    const ta=document.createElement('textarea'); ta.value=allLinks; ta.style.position='fixed'; ta.style.left='-999px'; document.body.appendChild(ta); ta.select();
    let ok=false; try{ ok=document.execCommand('copy'); } catch(e){ ok=false; }
    document.body.removeChild(ta);
    if(ok){
      fresh.forEach(item=>{ if(!copiedLinksArchive.has(item.link)) markLinkAsCopied(item.link); });
      const rect=document.getElementById('copyAllBtn').getBoundingClientRect(); triggerCopyFlash(rect.left+rect.width/2, rect.top+rect.height/2);
      showStatus(`✅ Copied ${fresh.length} fresh links & locked permanently`);
      if(filteredData.length){ filteredData=filteredData.map(d=>fresh.some(f=>f.link===d.link)?{...d,copied:true}:d); displayData(filteredData); }
      else displayData(currentData);
      const newLocked=currentData.filter(d=>d.copied).length;
      document.getElementById('copyStatsDisplay').innerHTML=`🔒 Locked: ${newLocked} / ${currentData.length}`;
    } else showStatus('Copy all failed','error');
  }

  function exportToCSV(){
    const source=filteredData.length?filteredData:currentData;
    if(!source.length) return;
    let csv='Receipt No.,Sales Type,Survey Model,Generated Link,Locked\n';
    source.forEach(r=>csv+=`"${r.receiptNo}","${r.salesType}","${r.surveyModel}","${r.link}","${r.copied?'LOCKED':'FRESH'}"\n`);
    const blob=new Blob([csv],{type:'text/csv'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='violet_survey_status.csv'; a.click(); showStatus('📎 CSV exported');
  }

  function searchOrderId(){ const term=document.getElementById('searchBox').value.trim(); if(term){ filteredData=currentData.filter(d=>d.receiptNo.includes(term)); displayData(filteredData); showStatus(`Found ${filteredData.length}`); } }
  function clearSearch(){ document.getElementById('searchBox').value=''; filteredData=[]; displayData(currentData); showStatus('All records'); }

  function generateQRCodes(data){ currentQRData=data; const slides=document.getElementById('qrSlides'); slides.innerHTML=''; data.forEach(item=>{ const slide=document.createElement('div'); slide.className='qr-slide'; const qrDiv=document.createElement('div'); qrDiv.className='qr-code'; const qr=qrcode(0,'M'); qr.addData(item.link); qr.make(); qrDiv.innerHTML=qr.createImgTag(4); const info=document.createElement('div'); info.style.fontSize='0.8rem'; info.style.fontWeight='500'; info.innerText=`${item.receiptNo} – ${item.salesType} ${item.copied?'🔒':'🟢'}`; slide.appendChild(qrDiv); slide.appendChild(info); slides.appendChild(slide); }); currentQRIndex=0; updateQRSlides(); updateQRCounter(); }
  function openQRModal(){ document.getElementById('qrModal').style.display='flex'; if(currentData.length) generateQRCodes(currentData); }
  function closeQRModal(){ document.getElementById('qrModal').style.display='none'; }
  function nextQR(){ if(currentQRIndex<currentQRData.length-1){ currentQRIndex++; updateQRSlides(); } }
  function prevQR(){ if(currentQRIndex>0){ currentQRIndex--; updateQRSlides(); } }
  function updateQRSlides(){ document.getElementById('qrSlides').style.transform=`translateX(-${currentQRIndex*100}%)`; updateQRCounter(); }
  function updateQRCounter(){ document.getElementById('qrCounter').innerText=`${currentQRIndex+1} / ${currentQRData.length||0}`; }

  document.getElementById('generateBtn').onclick=processFile;
  document.getElementById('copyAllBtn').onclick=copyAllLinks;
  document.getElementById('exportBtn').onclick=exportToCSV;
  document.getElementById('openQRBtn').onclick=openQRModal;
  document.getElementById('clearAllBtn').onclick=()=>{ currentData=[]; filteredData=[]; document.querySelector('#linkTable tbody').innerHTML=''; document.getElementById('fileInput').value=''; document.getElementById('fileName').innerText='No file selected'; document.getElementById('copyAllBtn').disabled=true; document.getElementById('exportBtn').disabled=true; document.getElementById('openQRBtn').disabled=true; document.getElementById('searchBox').disabled=true; document.getElementById('searchBtn').disabled=true; document.getElementById('clearSearchBtn').disabled=true; document.getElementById('salesTypeFilters').style.display='none'; document.getElementById('copyStatsDisplay').style.display='none'; closeQRModal(); showStatus('Cleared all data (tracker persists)'); };
  document.getElementById('fileInput').addEventListener('change',(e)=>{ const name=e.target.files[0]?.name||''; document.getElementById('fileName').innerText=name||'No file selected'; document.getElementById('generateBtn').disabled=!e.target.files.length; });
  document.getElementById('searchBtn').onclick=searchOrderId; document.getElementById('clearSearchBtn').onclick=clearSearch;
  document.querySelectorAll('#salesTypeFilters .filter-btn').forEach(btn=>{ btn.addEventListener('click',function(){ document.querySelectorAll('#salesTypeFilters .filter-btn').forEach(b=>b.classList.remove('active')); this.classList.add('active'); const type=this.dataset.type; if(type==='all') displayData(currentData); else displayData(currentData.filter(d=>d.salesType===type)); }); });
  document.querySelectorAll('#qrFilters .filter-btn').forEach(btn=>{ btn.addEventListener('click',function(){ document.querySelectorAll('#qrFilters .filter-btn').forEach(b=>b.classList.remove('active')); this.classList.add('active'); const type=this.dataset.type; if(type==='all') generateQRCodes(currentData); else generateQRCodes(currentData.filter(d=>d.salesType===type)); }); });
  document.getElementById('prevBtn').onclick=prevQR; document.getElementById('nextBtn').onclick=nextQR;
  window.onclick=e=>{ if(e.target===document.getElementById('qrModal')) closeQRModal(); };
</script>
</body>
</html>
